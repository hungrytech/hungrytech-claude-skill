openapi: 3.1.0
info:
  title: "{SERVICE_NAME} API"
  version: "{API_VERSION}"
  description: "{SERVICE_DESCRIPTION}"
  contact:
    name: "{TEAM_NAME}"
    email: "{TEAM_EMAIL}"

servers:
  - url: "https://api.{DOMAIN}/v1"
    description: Production
  - url: "https://api-staging.{DOMAIN}/v1"
    description: Staging

paths:
  "/{RESOURCE_PLURAL}":
    get:
      summary: "{RESOURCE_NAME} 목록 조회"
      operationId: "list{RESOURCE_NAME_PASCAL}s"
      tags:
        - "{RESOURCE_NAME}"
      parameters:
        - name: cursor
          in: query
          schema:
            type: string
        - name: size
          in: query
          schema:
            type: integer
            default: 20
            maximum: 100
      responses:
        "200":
          description: 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/{RESOURCE_NAME_PASCAL}ListResponse"
    post:
      summary: "{RESOURCE_NAME} 생성"
      operationId: "create{RESOURCE_NAME_PASCAL}"
      tags:
        - "{RESOURCE_NAME}"
      requestBody:
        required: true
        content:
          application/json:
            schema:
              $ref: "#/components/schemas/Create{RESOURCE_NAME_PASCAL}Request"
      responses:
        "201":
          description: 생성 성공
          content:
            application/json:
              schema:
                $ref: "#/components/schemas/{RESOURCE_NAME_PASCAL}Response"
        "400":
          $ref: "#/components/responses/BadRequest"

components:
  schemas:
    "{RESOURCE_NAME_PASCAL}Response":
      type: object
      properties:
        id:
          type: string
          format: uuid
        created_at:
          type: string
          format: date-time
      required:
        - id
  responses:
    BadRequest:
      description: 잘못된 요청
      content:
        application/problem+json:
          schema:
            $ref: "#/components/schemas/ProblemDetail"
    ProblemDetail:
      type: object
      properties:
        type:
          type: string
          format: uri
        title:
          type: string
        status:
          type: integer
        detail:
          type: string
        instance:
          type: string
  securitySchemes:
    bearerAuth:
      type: http
      scheme: bearer
      bearerFormat: JWT

security:
  - bearerAuth: []
