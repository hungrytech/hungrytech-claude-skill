apiVersion: apps/v1
kind: Deployment
metadata:
  name: "{APP_NAME}"
  labels:
    app: "{APP_NAME}"
spec:
  replicas: "{REPLICAS}"
  selector:
    matchLabels:
      app: "{APP_NAME}"
  strategy:
    type: RollingUpdate
    rollingUpdate:
      maxSurge: 1
      maxUnavailable: 0
  template:
    metadata:
      labels:
        app: "{APP_NAME}"
    spec:
      securityContext:
        runAsNonRoot: true
        runAsUser: 65534
      containers:
        - name: "{APP_NAME}"
          image: "{REGISTRY}/{APP_NAME}:{IMAGE_TAG}"
          ports:
            - containerPort: 8080
          env:
            - name: SPRING_PROFILES_ACTIVE
              value: "{PROFILE}"
          envFrom:
            - secretRef:
                name: "{APP_NAME}-secrets"
            - configMapRef:
                name: "{APP_NAME}-config"
          resources:
            requests:
              memory: "{MEMORY_REQUEST}"
              cpu: "{CPU_REQUEST}"
            limits:
              memory: "{MEMORY_LIMIT}"
              cpu: "{CPU_LIMIT}"
          readinessProbe:
            httpGet:
              path: /actuator/health/readiness
              port: 8080
            initialDelaySeconds: 15
            periodSeconds: 10
          livenessProbe:
            httpGet:
              path: /actuator/health/liveness
              port: 8080
            initialDelaySeconds: 30
            periodSeconds: 15
---
apiVersion: v1
kind: Service
metadata:
  name: "{APP_NAME}"
spec:
  selector:
    app: "{APP_NAME}"
  ports:
    - port: 80
      targetPort: 8080
  type: ClusterIP
---
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: "{APP_NAME}"
  annotations:
    nginx.ingress.kubernetes.io/rewrite-target: /
spec:
  ingressClassName: nginx
  rules:
    - host: "{APP_DOMAIN}"
      http:
        paths:
          - path: /
            pathType: Prefix
            backend:
              service:
                name: "{APP_NAME}"
                port:
                  number: 80
